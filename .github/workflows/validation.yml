name: validation

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    paths:
      - datasets/**
      - publishers/**
      - scopes/**
      - profiles/**

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - command: batch-validate
            resource: datasets
          - command: validate-publishers
            resource: publishers
          - command: validate-scopes
            resource: scopes
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - id: install-schema-tools
        run: |
          python -m pip install --force-reinstall -v "amsterdam-schema-tools>=9.10.2"
      - id: changed-files
        # We are only interested in changed and new (not deleted) datasets files.
        run: |
          declare -a changed
          changed=$(git --no-pager diff --name-only --diff-filter=d origin/master.. -- ${{ matrix.resource }})
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$changed" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
        shell: bash
      - name: Run schema ${{ matrix.command }} and capture log
        if: ${{ steps.changed-files.outputs.changed != '' }}
        shell: bash
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.changed }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          LOG_FILE="artifacts/${{ matrix.command }}.log"

          if [[ "${{ matrix.command }}" == "batch-validate" ]]; then
            mapfile -t changed_files <<< "$CHANGED_FILES"
            schema batch-validate https://schemas.data.amsterdam.nl/schema@v4.2.0 \
              "${changed_files[@]}" \
              2> >(tee "$LOG_FILE" >&2)
          else
            schema ${{matrix.command}} https://schemas.data.amsterdam.nl/schema@v4.2.0 \
              --schema-url ./${{ matrix.resource }} \
              2> >(tee "$LOG_FILE" >&2)
          fi
      - name: Upload log
        if: ${{ always() && steps.changed-files.outputs.changed != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.command }}-log
          path: artifacts/${{ matrix.command }}.log
          retention-days: 7

  validate-against-previous-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        resource: [tables, datasets]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - id: install-schema-tools
        run: |
          python -m pip install --force-reinstall -v "amsterdam-schema-tools>=9.10.1"
      - id: generate-previous-files
        run: |
          previous_files=$(./scripts/generate_previous_${{ matrix.resource }}_from_master.sh ${{github.head_ref || github.ref_name}} | tail -n 1)
          echo "previous_files=$previous_files" >> $GITHUB_OUTPUT
      - name: Run schema validate-${{ matrix.resource }}
        if: ${{ steps.generate-previous-files.outputs.previous_files != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          LOG_FILE="artifacts/validate-${{ matrix.resource }}.log"
          schema validate-${{ matrix.resource }} ${{ steps.generate-previous-files.outputs.previous_files }} 2> >(tee "$LOG_FILE" >&2)
      - name: Upload log
        if: ${{ always() && steps.generate-previous-files.outputs.previous_files != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: validate-${{ matrix.resource }}-log
          path: artifacts/validate-${{ matrix.resource }}.log
          retention-days: 7

  create-pr-comment:
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [validate-schemas, validate-against-previous-versions]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
      pull-requests: write
    steps:
      - name: Download logs
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.run_id }}
          pattern: "*-log"
          merge-multiple: true
          path: artifacts
      - name: Create comment body from logs
        id: comment
        shell: bash
        run: |
          ARTIFACT_DIR="${{ github.workspace }}/artifacts"
          COMMENT_BODY=""

          if [[ -d "$ARTIFACT_DIR" ]]; then
            while IFS= read -r file_path; do
              # Remove timestamps from log lines to avoid unnecessary noise in the review.
              file_content=$(sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]+)?Z[[:space:]]+//' "$file_path")

              # Skip empty logs to avoid cluttering the review with empty sections.
              if [[ -z "${file_content//[[:space:]]/}" ]]; then
                continue
              fi

              if [[ -n "$COMMENT_BODY" ]]; then
                COMMENT_BODY+=$'\n'
              fi

              COMMENT_BODY+="$file_content"
              COMMENT_BODY+=$'\n'
            done < <(find "$ARTIFACT_DIR" -type f | sort)
          fi

          echo "comment_body<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Upsert sticky bot comment
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.comment.outputs.comment_body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = ${{ github.event.pull_request.number }};
            const botLogin = "github-actions[bot]";
            const marker = "<!-- bot-comment-id: ci-refresh -->";
            const commentBody = process.env.COMMENT_BODY.trim();

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pull_number, per_page: 100 }
            );

            const previous = [...comments]
              .reverse()
              .find(comment =>
                comment.user?.login === botLogin &&
                typeof comment.body === "string" &&
                comment.body.includes(marker)
              );

            if (!commentBody) {
              if (previous) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: previous.id
                });
              }
              return;
            }

            const nextBody = `# Validation Results:\n\n${commentBody}\n\n${marker}`;

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body: nextBody
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: nextBody
            });
